<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Payment Form</title>

<style>

body{
font-family: Arial;
background:#f2f2f2;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
}

.container{
background:white;
padding:30px;
width:350px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,0.2);
}

h2{
text-align:center;
}

input{
width:100%;
padding:10px;
margin:8px 0;
border:1px solid #ccc;
border-radius:5px;
}

button{
width:100%;
padding:12px;
background:#28a745;
color:white;
border:none;
border-radius:5px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#218838;
}

.error{
color:red;
font-size:14px;
}

</style>
</head>


<body>

<div class="container">

<h2>Payment Form</h2>

<form id="paymentForm">

<label>Card Holder Name</label>
<input type="text" id="name" placeholder="John Doe">

<label>Card Number</label>
<input type="text" id="card" placeholder="1234 5678 9012 3456">

<label>Expiry Date</label>
<input type="text" id="expiry" placeholder="MM/YY">

<label>CVV</label>
<input type="password" id="cvv" placeholder="123">

<p class="error" id="error"></p>

<button type="submit">Pay Now</button>

</form>

</div>

<script>

document.getElementById("paymentForm").addEventListener("submit", function(e){

e.preventDefault();

let name = document.getElementById("name").value;
let card = document.getElementById("card").value;
let expiry = document.getElementById("expiry").value;
let cvv = document.getElementById("cvv").value;
let error = document.getElementById("error");

if(name=="" || card=="" || expiry=="" || cvv==""){
error.innerText = "Please fill all fields";
return;
}

if(card.length < 16){
error.innerText = "Card number must be 16 digits";
return;
}

if(cvv.length < 3){
error.innerText = "CVV must be 3 digits";
return;
}

error.innerText = "";

alert("Payment Successful!");

});

</script>

</body>
</html>
