<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>My Online Store</title>
<link rel="stylesheet" href="style.css">
</head>

<body>

<header>
<h1>My Online Store</h1>
<div class="cart">
🛒 Cart: <span id="cart-count">0</span>
</div>
</header>

<section class="products">

<div class="product">
<img src="img/img1.jpg">
<h3>T-Shirt</h3>
<p>Price: $20</p>
<button onclick="addToCart('T-Shirt',20)">Add to Cart</button>
</div>

<div class="product">
<img src="img/img2.png">
<h3>Shoes</h3>
<p>Price: $50</p>
<button onclick="addToCart('Shoes',50)">Add to Cart</button>
</div>

<div class="product">
<img src="img/img3.jpg">
<h3>Watch</h3>
<p>Price: $80</p>
<button onclick="addToCart('Watch',80)">Add to Cart</button>
</div>

</section>

<section class="cart-section">
<h2>Your Cart</h2>
<ul id="cart-items"></ul>
<h3>Total: $<span id="total">0</span></h3>
</section>

<script src="script.js"></script>
</body>
</html>
